name: Quality checks

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Use Node.js from package contract
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install locked dependencies
        run: npm ci

      - name: Lint source
        run: npm run lint

      - name: Check TypeScript
        run: npm run typecheck

      - name: Run cloud-independent unit tests
        run: npm run test:unit

      - name: Build and test server output
        run: npm test
